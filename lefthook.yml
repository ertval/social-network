# lefthook.yml
pre-commit:
  parallel: true
  jobs:
    - name: go-format
      glob: "*.go"
      run: GOFUMPT=$(go env GOPATH)/bin/gofumpt GOIMPORTS=$(go env GOPATH)/bin/goimports; $GOFUMPT -l {staged_files} | xargs -r $GOFUMPT -w && $GOIMPORTS -w -local social-network {staged_files}
      stage_fixed: true
    - name: eslint
      glob: "*.{js,mjs,cjs}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    - name: prettier
      glob: "*.{js,css,html,json,md}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  jobs:
    - name: gates
      run: bash -o pipefail -c 'go run ./cmd/gates/ --all 2>&1 | tee -a .gates-report.log'
