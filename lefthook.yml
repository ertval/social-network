# lefthook.yml
pre-commit:
  parallel: true
  jobs:
    - name: go-format
      glob: "*.go"
      run: GOFUMPT=$(go env GOPATH)/bin/gofumpt GOIMPORTS=$(go env GOPATH)/bin/goimports; $GOFUMPT -l {staged_files} | xargs -r $GOFUMPT -w && $GOIMPORTS -w -local social-network {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  jobs:
    - name: gates
      run: go run ./cmd/gates/ --all
