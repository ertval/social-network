version: "2"

run:
  go: "1.24"
  modules-download-mode: readonly
  issues-exit-code: 1
  tests: true
  timeout: 5m

output:
  formats:
    text:
      path: stderr
      print-linter-name: true
      print-issued-lines: true
      colors: true

linters:
  default: all
  disable:
    - cyclop
    - gocyclo
    - exhaustruct
    - funlen
    - godox
    - lll
    - nlreturn
    - nonamedreturns
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
    - ireturn
    - tagliatelle
    - mnd
    - prealloc
    - err113
    - noinlineerr
    - errchkjson
    - godot
    - goconst
    - gocritic
    - forbidigo
    - gochecknoglobals
    - funcorder
    - dupword
    - exhaustive
    - maintidx
    - gosec
    - misspell
    - predeclared

  settings:
    depguard:
      rules:
        domain_boundary:
          files:
            - internal/domain/**
          deny:
            - pkg: "social-network/internal/app"
              desc: "domain must not depend on app layer"
            - pkg: "social-network/internal/infra"
              desc: "domain must not depend on infra layer"
            - pkg: "social-network/internal/bootstrap"
              desc: "domain must not depend on bootstrap"
            - pkg: "social-network/internal/config"
              desc: "domain must not depend on config"
            - pkg: "social-network/internal/platform"
              desc: "domain must not depend on platform"
            - pkg: "social-network/internal/core"
              desc: "domain must not depend on core"
        pkg_boundary:
          files:
            - internal/pkg/**
          deny:
            - pkg: "social-network/internal/app"
              desc: "pkg must not depend on app layer"
            - pkg: "social-network/internal/infra"
              desc: "pkg must not depend on infra layer"
            - pkg: "social-network/internal/bootstrap"
              desc: "pkg must not depend on bootstrap"
            - pkg: "social-network/internal/config"
              desc: "pkg must not depend on config"
            - pkg: "social-network/internal/domain"
              desc: "pkg must not depend on domain layer"
            - pkg: "social-network/internal/platform"
              desc: "pkg must not depend on platform"
            - pkg: "social-network/internal/core"
              desc: "pkg must not depend on core"
        # D5 Vertical Slice Boundary Rules
        d5_commands_queries:
          files:
            - "internal/*/commands/**"
            - "internal/*/queries/**"
          deny:
            - pkg: "social-network/internal/*/transport"
              desc: "D5: commands/queries must not import transport"
            - pkg: "social-network/internal/*/store"
              desc: "D5: commands/queries must not import store"
        d5_transport:
          files:
            - "internal/*/transport/**"
          deny:
            - pkg: "social-network/internal/*/store"
              desc: "D5: transport must not import store"
        d5_store:
          files:
            - "internal/*/store/**"
          deny:
            - pkg: "social-network/internal/*/transport"
              desc: "D5: store must not import transport"
            - pkg: "social-network/internal/*/commands"
              desc: "D5: store must not import commands"
            - pkg: "social-network/internal/*/queries"
              desc: "D5: store must not import queries"
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: struct-tag
        - name: time-equal
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
    govet:
      enable-all: true
      settings:
        shadow:
          strict: false
    maintidx:
      under: 20
    misspell:
      locale: US
    paralleltest:
      ignore-missing: true
      ignore-missing-subtests: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    unused:
      field-writes-are-uses: false
      post-statements-are-reads: false
      exported-fields-are-used: true
      parameters-are-used: true
      local-variables-are-used: false
      generated-is-used: true

  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
    rules:
      - linters:
            - dupl
            - err113
            - gochecknoglobals
            - goconst
            - gocyclo
            - maintidx
            - mnd
        path: (.+)_test\.go
      - linters:
            - govet
        path: (.+)_test\.go
        text: 'fieldalignment:'
      - linters:
            - revive
        path: (.+)_test\.go
        text: 'unused-parameter:'
      - linters:
            - tagliatelle
        path: internal/pkg/oAuth/ # Disabled it because third party apis need snake case json tags
      - linters:
            - govet
        text: 'fieldalignment:'
      - linters:
            - errcheck
        path: internal/infra/storage/sqlite/chats/chatRepo\.go
        text: 'tx\.Rollback'
      - linters:
            - errcheck
        path: internal/infra/ws/client\.go
      - linters:
            - errcheck
        path: internal/app/topics/commands/
      - linters:
            - staticcheck
        path: internal/pkg/helpers/body_request\.go
      - linters:
            - govet
        path: internal/infra/storage/sqlite/users/userRepo\.go
        text: 'shadow:'
      - linters:
            - revive
        path: internal/domain/chat/chat_read\.go
        text: 'exported'
      - linters:
            - revive
        path: internal/infra/ws/router\.go
        text: 'exported'
      - linters:
            - revive
        path: internal/infra/http/ws/handler\.go
        text: 'unused-parameter'
    paths:
      - frontend/

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - frontend/
  settings:
    gci:
        sections:
          - standard   # Standard library
          - default    # Third-party imports
          - prefix(social-network)